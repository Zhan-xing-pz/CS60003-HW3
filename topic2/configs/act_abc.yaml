run:
  name: act_calvin_ABC
  output_root: outputs
  seed: 42

data:
  mode: lerobot
  train_repo_id: local/calvin_ABC
  train_root: data/lerobot_v21/local/calvin_ABC
  eval_repo_id: local/calvin_D
  eval_root: data/lerobot_v21/local/calvin_D
  validation_fraction: 0.1
  synthetic:
    train_size: 512
    valid_size: 128
    eval_size: 128
    state_dim: 16
    action_dim: 7
    episode_len: 32

model:
  backend: torch_act
  state_dim: 16
  action_dim: 7
  chunk_size: 16
  hidden_dim: 256
  num_layers: 4
  num_heads: 8
  dropout: 0.1

train:
  steps: 30000
  batch_size: 64
  learning_rate: 0.0001
  weight_decay: 0.000001
  optimizer: adamw
  loss: l1
  num_workers: 8
  device: cuda
  max_train_batches: null
  max_valid_batches: null
  log_every: 20
  save_freq: 1000
  eval_freq: 1000
  keep_only_best_checkpoint: true
  checkpoint_valid_batches: 50
  checkpoint_poll_s: 10
  wandb_mode: offline

eval:
  batch_size: 64
  num_workers: 8
  max_batches: 200
